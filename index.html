<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abriendo Inova Guard...</title>
</head>
<body>

    <p style="text-align: center; font-family: Arial, sans-serif; margin-top: 50px;">
        Abriendo la aplicación Inova Guard en tu dispositivo... <br><br>
        <small>Si no abre automáticamente en unos segundos, puedes cerrar esta ventana.</small>
    </p>

    <script>
        window.onload = function() {
            // Se incluye el Package Name exacto (inova.guard.app) para identificar tu app
            var intentUrl = "intent://#Intent;package=inova.guard.app;scheme=android-app;end";
            
            // Fuerza la redirección automática inmediata
            window.location.replace(intentUrl);
        };
    </script>

</body>
</html>
