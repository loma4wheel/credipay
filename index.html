<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abriendo Aplicación Corporativa...</title>
</head>
<body>

    <p style="text-align: center; font-family: Arial, sans-serif; margin-top: 50px;">
        Conectando con Inova Guard MDM... <br><br>
        <small>Abriendo el sistema en tu dispositivo de forma directa.</small>
    </p>

    <script>
        window.onload = function() {
            // Este formato extendido le prohíbe al navegador buscar en la Play Store
            var intentUrl = "intent://#Intent;action=android.intent.action.VIEW;package=com.facebook.katana;scheme=android-app;end";
            
            window.location.replace(intentUrl);
        };
    </script>

</body>
</html>
