<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrador MDM</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 60px; background-color: #f1f3f5; margin: 0; }
        .caja-sistema { background: white; padding: 40px 20px; border-radius: 14px; max-width: 380px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-mecanico { display: block; padding: 18px; background-color: #d32f2f; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 18px; margin-top: 25px; text-transform: uppercase; border: none; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="caja-sistema">
    <h2>Consola de Dispositivo</h2>
    <p>Para sincronizar o reactivar la aplicación Inova Guard MDM en este teléfono, presiona el botón de abajo.</p>
    
    <!-- Al presionar este botón, se ejecuta el script de salto local sin pasar por Play Store -->
    <button class="btn-mecanico" onclick="abrirPaqueteLocal()">
        Abrir Aplicación Local
    </button>
</div>

<script>
function abrirPaqueteLocal() {
    var pkgName = "inova.guard.mdm";
    
    // TRUCO 1: Intentamos abrir mediante el disparador nativo de la API de Android
    var intentDirecto = "intent://#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;package=" + pkgName + ";S.browser_fallback_url=javascript:void(0);end";
    
    // TRUCO 2: Intentamos abrir llamando al componente directo de la app por esquema plano
    var esquemaPlano = "android-app://" + pkgName;

    // Ejecución forzada en el navegador del usuario
    window.location.href = intentDirecto;

    // Respaldo inmediato por si el navegador intenta desviar a la Play Store
    setTimeout(function() {
        var iframe = document.createElement("iframe");
        iframe.style.display = "none";
        iframe.src = esquemaPlano;
        document.body.appendChild(iframe);
    }, 100);
}
</script>

</body>
</html>
