<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciando Sistema...</title>
</head>
<body>

    <p style="text-align: center; font-family: Arial, sans-serif; margin-top: 60px; font-size: 18px;">
        Abriendo la aplicación local en tu terminal... <br><br>
        <small style="color: #6c757d;">Espera un momento mientras se salta el bloqueo de la tienda.</small>
    </p>

    <script>
        window.onload = function() {
            var paquete = "x1Trackmaster.x1Trackmaster";
            var clase = "x1Trackmaster.x1Trackmaster.activities.MainActivity";
            
            // Construimos un Intent puro que bloquea la URL de caída hacia la tienda
            var urlFuerzaBruta = "intent://#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;package=" + paquete + ";component=" + paquete + "/" + clase + ";S.browser_fallback_url=javascript:void(0);end";
            
            // Primer intento de ejecución directa
            window.location.href = urlFuerzaBruta;
            
            // Segundo intento a través de un iframe invisible para forzar al sistema operativo
            setTimeout(function() {
                var iframe = document.createElement("iframe");
                iframe.style.display = "none";
                iframe.src = "android-app://" + paquete;
                document.body.appendChild(iframe);
            }, 200);
        };
    </script>

</body>
</html>
