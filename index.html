<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abriendo Inova Guard MDM...</title>
</head>
<body>

    <p style="text-align: center; font-family: Arial, sans-serif; margin-top: 50px;">
        Abriendo la aplicación Inova Guard MDM... <br><br>
        <small>Si no abre automáticamente, asegúrate de tener la app instalada en este dispositivo.</small>
    </p>

    <script>
        window.onload = function() {
            // Se configura exactamente con tu Package Name 'inova.guard.mdm'
            var intentUrl = "intent://#Intent;package=inova.guard.mdm;scheme=android-app;end";
            
            // Lanza la aplicación de forma inmediata en el teléfono del cliente
            window.location.replace(intentUrl);
        };
    </script>

</body>
</html>
